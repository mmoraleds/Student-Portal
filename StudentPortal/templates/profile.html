<!DOCTYPE html>
<html>
<head>
    <title>Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-body">

            <h1>My Profile</h1>

            <form method="POST">

                <label>Student ID</label>
                <input
                    type="text"
                    class="form-control mb-3"
                    value="{{ student[0] }}"
                    readonly>

                <label>Full Name</label>
                <input
                    type="text"
                    name="fullname"
                    class="form-control mb-3"
                    value="{{ student[1] }}">

                <label>Address</label>
                <input
                    type="text"
                    name="address"
                    class="form-control mb-3"
                    value="{{ student[2] }}">

                <label>Email</label>
                <input
                    type="email"
                    name="email"
                    class="form-control mb-3"
                    value="{{ student[3] }}">

                <button type="submit" class="btn btn-success">
                    Update Profile
                </button>

                <a href="/dashboard" class="btn btn-secondary">
                    Back
                </a>

            </form>

        </div>

    </div>

</div>

</body>
</html>
