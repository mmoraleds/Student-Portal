<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow">
        <div class="card-body">

            <h1>Create Account</h1>

            <form method="POST">

                <input type="text"
                       name="student_id"
                       placeholder="Student ID"
                       class="form-control mb-3"
                       required>

                <input type="text"
                       name="fullname"
                       placeholder="Full Name"
                       class="form-control mb-3"
                       required>

                <input type="text"
                       name="address"
                       placeholder="Address"
                       class="form-control mb-3"
                       required>

                <input type="email"
                       name="email"
                       placeholder="Email"
                       class="form-control mb-3"
                       required>

                <input type="password"
                       name="password"
                       placeholder="Password"
                       class="form-control mb-3"
                       required>

                <button type="submit" class="btn btn-success">
                    Register
                </button>

                <a href="/" class="btn btn-secondary">
                    Back
                </a>

            </form>

        </div>
    </div>

</div>

</body>
</html>
